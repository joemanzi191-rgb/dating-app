<!DOCTYPE html>
<html>
<head>
<title>My Dating App</title>

<style>
body{
font-family: Arial;
background:#f7b6c2;
text-align:center;
}

.card{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

img{
width:150px;
border-radius:10px;
}

button{
margin:10px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.like{
background:#ff4d6d;
color:white;
}

.pass{
background:#ccc;
}
</style>
</head>

<body>

<h1>❤️ My Dating App</h1>

<div class="card">
<img id="photo" src="https://randomuser.me/api/portraits/men/32.jpg">
<h2 id="name">Alex, 24</h2>
<p id="bio">Loves music and travel</p>

<button class="like" onclick="nextProfile()">❤️ Like</button>
<button class="pass" onclick="nextProfile()">❌ Pass</button>
</div>

<script>

const profiles = [
{
name:"Alex, 24",
bio:"Loves music and travel",
photo:"https://randomuser.me/api/portraits/men/32.jpg"
},
{
name:"Sarah, 22",
bio:"Coffee lover ☕",
photo:"https://randomuser.me/api/portraits/women/44.jpg"
},
{
name:"Michael, 26",
bio:"Gym and hiking",
photo:"https://randomuser.me/api/portraits/men/76.jpg"
},
{
name:"Emma, 23",
bio:"Artist and photographer",
photo:"https://randomuser.me/api/portraits/women/65.jpg"
}
]

let index = 0

function nextProfile(){

index++

if(index >= profiles.length){
index = 0
}

document.getElementById("name").innerText = profiles[index].name
document.getElementById("bio").innerText = profiles[index].bio
document.getElementById("photo").src = profiles[index].photo

}

</script>

</body>
</html>
