<!DOCTYPE html>
<html>
<head>
<title>ZedLove Dating</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.card{
width:300px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

img{
width:100%;
border-radius:10px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:5px;
font-size:16px;
}

.like{
background:#ff4d6d;
color:white;
}

.pass{
background:#ccc;
}
</style>

</head>

<body>

<h1>ZedLove ❤️</h1>

<div class="card">

<img id="profileImage">

<h2 id="name"></h2>

<p id="age"></p>

<p id="bio"></p>

<button class="pass" onclick="pass()">Pass</button>
<button class="like" onclick="like()">Like</button>

</div>


<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyHBEy9ow9e-AEZf6Pd3Cwfly1yXrdcxML4",
authDomain: "zedlove-bdfdb.firebaseapp.com",
projectId: "zedlove-bdfdb",
storageBucket: "zedlove-bdfdb.appspot.com",
messagingSenderId: "697655574975",
appId: "1:697655574975:web:deaacb6e056d8933d1d40a",
measurementId: "G-9KLGELWNWK"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let profiles = [];
let current = 0;

async function loadProfiles(){

const snapshot = await db.collection("users").get();

snapshot.forEach(doc=>{
profiles.push(doc.data());
});

showProfile();

}

function showProfile(){

if(profiles.length === 0){
document.getElementById("name").innerText="No profiles";
return;
}

const user = profiles[current];

document.getElementById("profileImage").src = user.image;
document.getElementById("name").innerText = user.name;
document.getElementById("age").innerText = "Age: " + user.age;
document.getElementById("bio").innerText = user.bio;

}

function like(){
nextProfile();
}

function pass(){
nextProfile();
}

function nextProfile(){

current++;

if(current >= profiles.length){
current = 0;
}

showProfile();

}

loadProfiles();

</script>

</body>
</html>
