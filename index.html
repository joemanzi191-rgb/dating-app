<!DOCTYPE html>
<html>
<head>
<title>My Dating App</title>

<style>

body{
font-family: Arial;
background:#ff4d6d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:300px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
padding:20px;
transition: transform 0.3s ease;
}

img{
width:100%;
border-radius:10px;
}

h2{
margin:10px 0;
}

p{
color:gray;
}

.buttons{
margin-top:15px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.like{
background:#4CAF50;
color:white;
}

.pass{
background:#f44336;
color:white;
}

</style>

</head>

<body> 
<div id="match" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#ff4d6d; color:white; padding:15px 25px; border-radius:10px; font-size:22px;">
🎉 It's a Match!
</div> 

<script>

const profiles = [

{
name:"Alex, 24",
bio:"Loves music and travel",
photo:"https://randomuser.me/api/portraits/men/32.jpg"
},

{
name:"Sarah, 22",
bio:"Coffee lover ☕",
photo:"https://randomuser.me/api/portraits/women/44.jpg"
},

{
name:"Michael, 26",
bio:"Gym and hiking",
photo:"https://randomuser.me/api/portraits/men/76.jpg"
},

{
name:"Emma, 23",
bio:"Artist and photographer",
photo:"https://randomuser.me/api/portraits/women/65.jpg"
}

];

let index=0;

function showProfile(){

document.getElementById("photo").src=profiles[index].photo;
document.getElementById("name").innerText=profiles[index].name;
document.getElementById("bio").innerText=profiles[index].bio;

}

function nextProfile(){

index++;

if(index>=profiles.length){
index=0;
}

showProfile();

}

function like(){

document.getElementById("match").style.display = "block";

setTimeout(function(){
document.getElementById("match").style.display = "none";
nextProfile();
},1500);




} 

function pass(){

document.querySelector(".card").style.transform = "translateX(-400px) rotate(-20deg)";

setTimeout(function(){
document.querySelector(".card").style.transform = "translateX(0)";
nextProfile();
},300);



}
let startX = 0;

document.querySelector(".card").addEventListener("touchstart", function(e){
startX = e.touches[0].clientX;
});

document.querySelector(".card").addEventListener("touchend", function(e){

let endX = e.changedTouches[0].clientX;

if(endX - startX > 50){
like();
}

if(startX - endX > 50){
pass();
}

});

</script>

</body>
