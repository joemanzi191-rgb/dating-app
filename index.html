<!DOCTYPE html>
<html>
<head>
  <title>ZedLove</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>

<body>

<h1>ZedLove Profiles</h1>

<div id="profiles"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBHEy9ow9e-AEZf6Pd3CwflylyXrdcxML4",
  authDomain: "zedlove-bdfdb.firebaseapp.com",
  projectId: "zedlove-bdfdb",
  storageBucket: "zedlove-bdfdb.firebasestorage.app",
  messagingSenderId: "697659574975",
  appId: "1:697659574975:web:48c32cb39cf07c3ed1d40a",
  measurementId: "G-1MYD7C0JRG"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

db.collection("users").get().then((querySnapshot) => {
  const profilesDiv = document.getElementById("profiles");

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    profilesDiv.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <img src="${data.image}" width="150"><br>
        <b>${data.name}</b><br>
        Age: ${data.age}<br>
        Bio: ${data.bio}
      </div>
    `;
  });

}).catch((error) => {
  console.log("Error getting profiles:", error);
});

</script>

</body>
</html>
