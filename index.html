<script>

const profiles = [
{
name: "Alex, 24",
bio: "Loves music and travel",
photo: "https://randomuser.me/api/portraits/men/32.jpg"
},
{
name: "Sarah, 22",
bio: "Coffee lover ☕",
photo: "https://randomuser.me/api/portraits/women/44.jpg"
},
{
name: "Michael, 26",
bio: "Gym and hiking",
photo: "https://randomuser.me/api/portraits/men/76.jpg"
},
{
name: "Emma, 23",
bio: "Artist and photographer",
photo: "https://randomuser.me/api/portraits/women/65.jpg"
}
];

let index = 0;

function nextProfile(){

index++;

if(index >= profiles.length){
index = 0;
}

document.querySelector("img").src = profiles[index].photo;
document.querySelector("h2").innerText = profiles[index].name;
document.querySelector("p").innerText = profiles[index].bio;

}

function like(){
nextProfile();
}

function pass(){
nextProfile();
}

</script>
