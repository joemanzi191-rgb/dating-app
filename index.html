<!DOCTYPE html>
<html>
<head>
<title>My Dating App</title>

<style>
body{
font-family: Arial;
background:pink;
text-align:center;
}

.card{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

button{
padding:10px;
margin:10px;
font-size:16px;
}
</style>

</head>

<body>

<h1>❤️ My Dating App</h1>

<div class="card">

<img src="https://randomuser.me/api/portraits/men/32.jpg" width="200">

<h2>Alex, 24</h2>

<p>Loves music and travel</p>

<button onclick="like()">❤️ Like</button>
<button onclick="pass()">❌ Pass</button>

</div>

<script>

function like(){
alert("You liked this profile!");
}

function pass(){
alert("You passed.");
}

</script>

</body>
</html>
