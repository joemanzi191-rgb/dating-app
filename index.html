<!DOCTYPE html>
<html>
<head>
<title>Swipe App</title>

<style>
body{
background:#ff4d6d;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
width:260px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.card img{
width:100%;
border-radius:10px;
}

button{
padding:8px 15px;
margin:10px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.like{
background:#ff4d6d;
color:white;
}

.pass{
background:#ddd;
}

#match{
display:none;
position:absolute;
top:40%;
font-size:30px;
color:white;
font-weight:bold;
}
</style>

</head>

<body>

<div id="match">❤️ IT'S A MATCH!</div>

<div class="card">

<img id="photo" src="">
<h2 id="name"></h2>
<p id="bio"></p>

<button class="like" onclick="like()">❤️ Like</button>
<button class="pass" onclick="pass()">❌ Pass</button>

</div>

<script>

let profiles = [

{
name:"Alex, 24",
bio:"Loves music and travel",
photo:"https://randomuser.me/api/portraits/men/32.jpg"
},

{
name:"Emma, 22",
bio:"Coffee lover and dancer",
photo:"https://randomuser.me/api/portraits/women/44.jpg"
},

{
name:"Mike, 26",
bio:"Gym and adventure",
photo:"https://randomuser.me/api/portraits/men/75.jpg"
}

];

let index = 0;

function showProfile(){
document.getElementById("photo").src = profiles[index].photo;
document.getElementById("name").innerText = profiles[index].name;
document.getElementById("bio").innerText = profiles[index].bio;
}

function nextProfile(){
index++;

if(index >= profiles.length){
index = 0;
}

showProfile();
}

function like(){

document.getElementById("match").style.display="block";

setTimeout(function(){

document.getElementById("match").style.display="none";
nextProfile();

},1500);

}

function pass(){
nextProfile();
}

showProfile();

</script>

</body>
</html>
