<!DOCTYPE html>
<html>
<head>
<title>ZedLove Dating</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.card{
width:300px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

img{
width:100%;
border-radius:10px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:5px;
font-size:16px;
}

.like{
background:#ff4d6d;
color:white;
}

.pass{
background:#ccc;
}
</style>

</head>

<body>

<h1>ZedLove ❤️</h1>

<div class="card">

<img id="profileImage">

<h2 id="name"></h2>

<p id="age"></p>

<p id="bio"></p>

<button class="pass" onclick="pass()">Pass</button>
<button class="like" onclick="like()">Like</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>


const firebaseConfig = {
  apiKey: "AIzaSyBHEy9ow9e-AEZf6Pd3CwflylyXrdcxML4",
  authDomain: "zedlove-bdfdb.firebaseapp.com",
  projectId: "zedlove-bdfdb",
  storageBucket: "zedlove-bdfdb.firebasestorage.app",
  messagingSenderId: "697659574975",
  appId: "1:697659574975:web:deaacb6e056d8933d1d40a",
  measurementId: "G-M9KLGEWNWK"
};



firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let profiles = [];
let index = 0;

db.collection("users").get().then((snapshot)=>{

snapshot.forEach((doc)=>{
profiles.push(doc.data());
});

showProfile();

});

function showProfile(){

if(profiles.length === 0) return;

let p = profiles[index];

document.getElementById("profileImage").src = p.Image;
document.getElementById("name").innerText = p.name;
document.getElementById("age").innerText = "Age: " + p.age;
document.getElementById("bio").innerText = p.Bio;

}

function nextProfile(){

index++;

if(index >= profiles.length){
index = 0;
}

showProfile();

}

function like(){

alert("It's a Match ❤️");

nextProfile();

}

function pass(){

nextProfile();

}

</script>

</body>
</html>
