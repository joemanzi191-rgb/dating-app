<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoveConnect</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ff4d6d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.screen{
background:white;
padding:20px;
border-radius:12px;
width:330px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

input{
width:90%;
padding:8px;
margin:5px 0;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.like{background:#ff4d6d;color:white;}
.pass{background:#ccc;}

.card img{
width:100%;
border-radius:10px;
}

#match{
display:none;
position:absolute;
top:20%;
font-size:30px;
color:white;
font-weight:bold;
}

#chatBox{
height:220px;
overflow:auto;
border:1px solid #ddd;
margin-bottom:10px;
padding:5px;
text-align:left;
}

.message{
background:#eee;
padding:6px;
border-radius:6px;
margin:5px 0;
}

</style>
</head>

<body>

<div id="match">❤️ IT'S A MATCH!</div>

<!-- LOGIN -->
<div id="login" class="screen">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account?</p>

<button onclick="showSignup()">Sign Up</button>

</div>

<!-- SIGNUP -->
<div id="signup" class="screen" style="display:none">

<h2>Create Profile</h2>

<input id="newUser" placeholder="Username">
<input id="newPass" type="password" placeholder="Password">
<input id="newName" placeholder="Name">
<input id="newAge" placeholder="Age">
<input id="newBio" placeholder="Bio">
<input id="newPhoto" placeholder="Photo URL">

<button onclick="signup()">Create</button>

<button onclick="showLogin()">Back</button>

</div>

<!-- SWIPE -->
<div id="app" class="screen" style="display:none">

<button onclick="logout()">Logout</button>

<div class="card">

<img id="photo">

<h3 id="name"></h3>

<p id="bio"></p>

<button class="like" onclick="like()">❤️ Like</button>
<button class="pass" onclick="pass()">❌ Pass</button>

</div>

</div>

<!-- CHAT -->
<div id="chat" class="screen" style="display:none">

<h3>Chat</h3>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Type message">

<button onclick="sendMessage()">Send</button>

<button onclick="back()">Back</button>

</div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[];

let profiles=[
{name:"Emma, 23",bio:"Coffee lover",photo:"https://randomuser.me/api/portraits/women/65.jpg"},
{name:"Sophia, 25",bio:"Music fan",photo:"https://randomuser.me/api/portraits/women/44.jpg"},
{name:"Liam, 27",bio:"Gym life",photo:"https://randomuser.me/api/portraits/men/32.jpg"}
];

let index=0;

function showSignup(){
login.style.display="none";
signup.style.display="block";
}

function showLogin(){
signup.style.display="none";
login.style.display="block";
}

function signup(){

let user={
username:newUser.value,
password:newPass.value
};

users.push(user);

localStorage.setItem("users",JSON.stringify(users));

alert("Account created");

showLogin();

}

function login(){

let u=loginUser.value;
let p=loginPass.value;

let found=users.find(x=>x.username==u && x.password==p);

if(found){

login.style.display="none";
app.style.display="block";

showProfile();

}else{
alert("Wrong login");
}

}

function logout(){

app.style.display="none";
login.style.display="block";

}

function showProfile(){

photo.src=profiles[index].photo;
name.innerText=profiles[index].name;
bio.innerText=profiles[index].bio;

}

function nextProfile(){

index++;

if(index>=profiles.length){
index=0;
}

showProfile();

}

function like(){

match.style.display="block";

setTimeout(function(){

match.style.display="none";
app.style.display="none";
chat.style.display="block";

},1200);

}

function pass(){
nextProfile();
}

function back(){

chat.style.display="none";
app.style.display="block";

nextProfile();

}

function sendMessage(){

let text=chatInput.value;

if(text=="")return;

let div=document.createElement("div");

div.className="message";

div.innerText=text;

chatBox.appendChild(div);

chatInput.value="";

}

</script>

</body>
</html>
